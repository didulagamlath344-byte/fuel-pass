<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Fuel Pass Pro Max+ </title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZ1ZWwgUGFzcyBQcm8iLAogICJzaG9ydF9uYW1lIjogIkZ1ZWxQYXNzIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDAwMDAwIiwKICAidGhlbWVfY29sb3IiOiAiI2ZmY2MwMCIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi80ODMvNDgzNDk3LnBuZyIsICJzaXplcyI6ICI1MTJ4NTEyIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiB9XQp9">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap');

        :root {
            --gold: #FFD700;
            --accent: #00F2FF;
            --bg-overlay: rgba(0, 0, 0, 0.85);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none;}

        body {
            margin: 0; padding: 0;
            background-color: #000;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: background-image 0.8s ease;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background: var(--bg-overlay);
            backdrop-filter: blur(12px);
            z-index: -1;
        }

        .header { padding: 10px 10px 2px; text-align: center; }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px; letter-spacing: 3px;
            color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            margin: 0; opacity: 0.8;
        }

        .tabs { display: flex; gap: 8px; padding: 5px 15px; }
        .tab-btn { 
            flex: 1; padding: 8px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--glass); color: #888; border-radius: 10px;
            font-size: 10px; font-weight: 600; cursor: pointer;
        }
        .tab-btn.active { background: var(--gold); color: black; border: none; box-shadow: 0 4px 10px rgba(255,215,0,0.3); }

        .v-selector { display: flex; overflow-x: auto; padding: 5px 15px; gap: 8px; scrollbar-width: none; }
        .v-selector::-webkit-scrollbar { display: none; }
        
        .v-chip {
            padding: 6px 12px; background: var(--glass); border-radius: 15px;
            white-space: nowrap; border: 1px solid rgba(255,255,255,0.1);
            font-size: 10px; transition: 0.3s;
        }
        .v-chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.15); }

        .view { display: none; flex: 1; padding: 0 10px 10px; flex-direction: column; }
        .view.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Full Screen Optimized Card --- */
        .card-container {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .v-info-top { margin-bottom: 5px; }
        .v-icon-box { font-size: 30px; margin-bottom: 0px; }
        .v-no-main { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; margin: 0; color: #fff; letter-spacing: 1px; }

        /* --- MAXIMUM QR AREA --- */
        .qr-art-frame {
            background: #FFFFFF;
            width: 85vw; 
            height: 85vw; 
            max-width: 340px; 
            max-height: 340px;
            margin: 5px auto; 
            border-radius: 20px;
            padding: 10px; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
            border: 10px solid #FFFFFF; /* සුදු බෝඩරය වැඩිකළා ස්කෑනරයට ලේසි වෙන්න */
        }
        
        #mainQr {
            width: 100%; height: 100%;
            object-fit: contain;
            image-rendering: auto;
        }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 5px; }
        .stat-card { background: rgba(0,0,0,0.6); padding: 8px 2px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .s-val { color: var(--gold); font-size: 15px; font-weight: 700; }
        .s-lbl { font-size: 8px; opacity: 0.5; text-transform: uppercase; }

        #fuelWarn { background: #ff4444; color: white; padding: 2px 10px; border-radius: 50px; font-size: 9px; font-weight: bold; align-self: center; margin-bottom: 5px; animation: blink 1s infinite; display: none; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Management & Form */
        #vList { overflow-y: auto; flex: 1; margin-bottom: 10px; }
        .manage-card {
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px;
            margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
        }

        #formOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 2000; padding: 20px; flex-direction: column; overflow-y: auto;
        }
        input, select {
            width: 100%; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.08);
            border: 1px solid #333; color: white; margin-top: 5px; font-size: 14px;
        }
        .btn-save { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header"><p class="logo-text">FUEL PASS PRO</p></div>

    <div class="tabs">
        <button class="tab-btn active" id="btnH" onclick="switchTab('home', this)">MY CARD</button>
        <button class="tab-btn" id="btnM" onclick="switchTab('manage', this)">GARAGE</button>
    </div>

    <div id="home" class="view active">
        <div class="v-selector" id="topSelector"></div>
        
        <div class="card-container" id="mainCard">
            <div class="v-info-top">
                <div class="v-icon-box" id="dispIcon">🚗</div>
                <p class="v-no-main" id="dispV">NO DATA</p>
                <div id="fuelWarn">⚠️ LOW BALANCE</div>
            </div>
            
            <div class="qr-art-frame">
                <img id="mainQr" src="" style="display:none;">
                <p id="noQrText" style="color:#666; font-size: 11px;">Add QR in Garage</p>
            </div>
            
            <div class="stats-row">
                <div class="stat-card"><div class="s-val" id="dispQ">0L</div><div class="s-lbl">Quota</div></div>
                <div class="stat-card"><div class="s-val" id="dispU">0L</div><div class="s-lbl">Used</div></div>
                <div class="stat-card" style="border: 1px solid rgba(0,255,136,0.15)"><div class="s-val" id="dispR" style="color:#00ff88">0L</div><div class="s-lbl">Bal</div></div>
            </div>
        </div>
    </div>

    <div id="manage" class="view">
        <h3 style="color:var(--gold); font-family:'Orbitron'; font-size:12px;">Manage Vehicles</h3>
        <div id="vList"></div>
        <button class="btn-save" onclick="openForm()">+ Add New Vehicle</button>
        <p onclick="forceAppUpdate()" style="color:var(--accent); font-size:10px; text-align:center; margin-top:15px; opacity:0.6; cursor:pointer;">Check for Updates</p>
    </div>

    <div id="formOverlay">
        <h2 style="font-family:'Orbitron'; color:var(--gold); font-size:18px;">Settings</h2>
        <input type="hidden" id="editIdx" value="-1">
        <select id="inT">
            <option value="🚗">Car</option>
            <option value="🏍️">Motorbike</option>
            <option value="🚐">Van</option>
            <option value="🛺">Tuk Tuk</option>
            <option value="🚛">Truck</option>
        </select>
        <input type="text" id="inV" placeholder="Vehicle Number">
        <input type="number" id="inQ" placeholder="Weekly Quota">
        <input type="number" id="inU" placeholder="Used Amount">
        <label style="font-size:10px; color:#666; margin-top:10px; display:block;">QR Image / Screenshot</label>
        <input type="file" id="inF" accept="image/*">
        <button class="btn-save" onclick="saveData()">SAVE</button>
        <p onclick="hideForm()" style="color:#ff4444; text-align:center; margin-top:20px; cursor:pointer;">Cancel</p>
    </div>

    <script>
        const bgImages = {
            "🚗": "https://images.unsplash.com/photo-1494976388531-d1058494cdd8?q=80&w=1000",
            "🏍️": "https://images.unsplash.com/photo-1558981403-c5f91cbba527?q=80&w=1000",
            "🚐": "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?q=80&w=1000",
            "🛺": "https://images.unsplash.com/photo-1590130751939-99432f866993?q=80&w=1000",
            "🚛": "https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?q=80&w=1000"
        };

        let vehicles = JSON.parse(localStorage.getItem('f_v_final_list')) || [];
        let activeIdx = parseInt(localStorage.getItem('f_v_final_idx')) || 0;

        function forceAppUpdate() {
            if(confirm("Refresh app?")) {
                const url = window.location.href.split('?')[0];
                window.location.href = url + '?v=' + new Date().getTime();
            }
        }

        window.addEventListener('focus', () => {
            fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' })
                .then(res => {
                    const lm = res.headers.get('last-modified');
                    if (lm && localStorage.getItem('app_lm') && lm !== localStorage.getItem('app_lm')) {
                        localStorage.setItem('app_lm', lm);
                        window.location.reload(true);
                    } else { localStorage.setItem('app_lm', lm); }
                }).catch(() => {});
        });

        function switchTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            id === 'home' ? renderHome() : renderManage();
        }

        function renderHome() {
            const selector = document.getElementById('topSelector');
            selector.innerHTML = '';
            if(vehicles.length === 0) return;

            vehicles.forEach((v, idx) => {
                const chip = document.createElement('div');
                chip.className = `v-chip ${idx === activeIdx ? 'selected' : ''}`;
                chip.innerHTML = `${v.type} ${v.no}`;
                chip.onclick = () => { activeIdx = idx; localStorage.setItem('f_v_final_idx', idx); renderHome(); };
                selector.appendChild(chip);
            });

            const v = vehicles[activeIdx] || vehicles[0];
            const bal = v.q - v.u;
            document.getElementById('dispV').innerText = v.no;
            document.getElementById('dispIcon').innerText = v.type;
            document.getElementById('dispQ').innerText = v.q + "L";
            document.getElementById('dispU').innerText = v.u + "L";
            document.getElementById('dispR').innerText = bal + "L";
            document.getElementById('fuelWarn').style.display = (bal <= 2) ? 'block' : 'none';
            document.body.style.backgroundImage = `url('${bgImages[v.type]}')`;

            const qr = document.getElementById('mainQr');
            if(v.qr) { qr.src = v.qr; qr.style.display = 'block'; document.getElementById('noQrText').style.display = 'none'; }
        }

        function renderManage() {
            const list = document.getElementById('vList');
            list.innerHTML = '';
            vehicles.forEach((v, idx) => {
                list.innerHTML += `<div class="manage-card">
                    <div><b style="color:var(--gold)">${v.no}</b><br><small style="opacity:0.5">${v.type}</small></div>
                    <div>
                        <button onclick="openForm(${idx})" style="background:none; border:1px solid #555; color:white; padding:5px 8px; border-radius:8px; font-size:9px;">EDIT</button>
                        <button onclick="deleteV(${idx})" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:5px 8px; border-radius:8px; font-size:9px;">X</button>
                    </div>
                </div>`;
            });
        }

        function openForm(idx = -1) {
            document.getElementById('formOverlay').style.display = 'flex';
            if(idx > -1) {
                const v = vehicles[idx];
                document.getElementById('inV').value = v.no; document.getElementById('inQ').value = v.q;
                document.getElementById('inU').value = v.u; document.getElementById('inT').value = v.type;
                document.getElementById('editIdx').value = idx;
            } else {
                document.getElementById('editIdx').value = -1;
                document.getElementById('inV').value = ''; document.getElementById('inQ').value = ''; document.getElementById('inU').value = '0';
            }
        }

        function hideForm() { document.getElementById('formOverlay').style.display = 'none'; }

        function saveData() {
            const no = document.getElementById('inV').value.toUpperCase();
            const q = document.getElementById('inQ').value;
            const u = document.getElementById('inU').value;
            const type = document.getElementById('inT').value;
            const f = document.getElementById('inF').files[0];
            const idx = parseInt(document.getElementById('editIdx').value);
            if(!no || !q) return alert("Fill all!");

            let vData = idx > -1 ? vehicles[idx] : { no, q, u, type, qr: '' };
            vData.no = no; vData.q = q; vData.u = u; vData.type = type;

            if(f) {
                const reader = new FileReader();
                reader.onload = e => { vData.qr = e.target.result; if(idx === -1) vehicles.push(vData); finalize(); };
                reader.readAsDataURL(f);
            } else { if(idx === -1) return alert("Upload QR!"); finalize(); }
        }

        function finalize() {
            localStorage.setItem('f_v_final_list', JSON.stringify(vehicles));
            hideForm(); renderHome(); switchTab('home', document.getElementById('btnH'));
        }

        function deleteV(idx) {
            if(confirm("Remove?")) { vehicles.splice(idx,1); localStorage.setItem('f_v_final_list', JSON.stringify(vehicles)); renderManage(); }
        }
        window.onload = renderHome;
    </script>
</body>
</html>
