<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Fuel Pass Multi-Pro</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZ1ZWwgUGFzcyBQcm8iLAogICJzaG9ydF9uYW1lIjogIkZ1ZWxQYXNzIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDAwMDAwIiwKICAidGhlbWVfY29sb3IiOiAiI2ZmY2MwMCIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi80ODMvNDgzNDk3LnBuZyIsICJzaXplcyI6ICI1MTJ4NTEyIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiB9XQp9">
    <style>
        :root { --gold: #ffcc00; --bg: #000; --glass: rgba(255,255,255,0.08); }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; color: white; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Navigation Tabs */
        .tabs { display: flex; background: #111; border-bottom: 1px solid #222; z-index: 10; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; font-size: 13px; }
        .tab-btn.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

        /* Vehicle Selector Bar */
        .vehicle-selector { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: #0a0a0a; border-bottom: 1px solid #222; scrollbar-width: none; }
        .vehicle-selector::-webkit-scrollbar { display: none; }
        .v-chip { padding: 8px 15px; background: var(--glass); border-radius: 20px; font-size: 12px; white-space: nowrap; border: 1px solid transparent; }
        .v-chip.selected { border-color: var(--gold); color: var(--gold); background: rgba(255,204,0,0.1); }

        .view { display: none; flex: 1; overflow-y: auto; padding: 15px; text-align: center; }
        .view.active { display: flex; flex-direction: column; }

        /* Card Section */
        .v-no-display { font-size: 36px; font-weight: 900; color: var(--gold); margin: 10px 0; text-transform: uppercase; }
        .qr-container { background: white; width: 85vw; height: 85vw; max-width: 320px; margin: 10px auto; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 12px; box-shadow: 0 0 30px rgba(255,204,0,0.15); }
        #mainQr { width: 100%; height: 100%; object-fit: contain; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: var(--glass); padding: 12px 5px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .s-val { color: var(--gold); font-size: 18px; font-weight: bold; }
        .s-lbl { font-size: 9px; opacity: 0.5; text-transform: uppercase; margin-top: 3px; }

        /* Management Styles */
        .card-list-item { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .btn-add { background: var(--gold); color: black; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; border: none; }
        .btn-del { color: #ff4444; background: none; border: 1px solid #ff4444; padding: 5px 10px; border-radius: 8px; font-size: 11px; }

        /* Form Overlay */
        #formOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 25px; flex-direction: column; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 16px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('home', this)">FUEL PASS</button>
        <button class="tab-btn" onclick="switchTab('manage', this)">MANAGE VEHICLES</button>
    </div>

    <div id="home" class="view active">
        <div class="vehicle-selector" id="topSelector">
            </div>

        <div id="cardContent">
            <p class="v-no-display" id="dispV">NO DATA</p>
            <div class="qr-container">
                <img id="mainQr" src="" style="display:none;">
                <p id="noQrText" style="color:#888;">කරුණාකර වාහනයක් ඇතුළත් කරන්න</p>
            </div>
            <div class="stats-grid">
                <div class="stat-box"><div class="s-val" id="dispQ">0L</div><div class="s-lbl">Quota</div></div>
                <div class="stat-box"><div class="s-val" id="dispU">0L</div><div class="s-lbl">Used</div></div>
                <div class="stat-box"><div class="s-val" id="dispR" style="color:#00ff88">0L</div><div class="s-lbl">Rem</div></div>
            </div>
        </div>
    </div>

    <div id="manage" class="view">
        <h3 style="color:var(--gold); margin-top:0;">සියලුම වාහන</h3>
        <div id="vList"></div>
        <button class="btn-add" onclick="showForm()">+ නව වාහනයක් එක් කරන්න</button>
    </div>

    <div id="formOverlay">
        <h2 id="formTitle">නව වාහනය</h2>
        <input type="text" id="inV" placeholder="වාහන අංකය (Ex: BGW-0898)">
        <input type="number" id="inQ" placeholder="සතිපතා Quota (L)">
        <input type="number" id="inU" placeholder="පාවිච්චි කළ ප්‍රමාණය (L)">
        <label style="font-size:12px; color:#888;">QR Screenshot එක:</label>
        <input type="file" id="inF" accept="image/*">
        <button class="btn-add" onclick="saveVehicle()">තොරතුරු සුරකින්න</button>
        <button onclick="hideForm()" style="background:none; border:none; color:#ff4444; margin-top:20px;">අවලංගු කරන්න</button>
    </div>

    <script>
        let vehicles = JSON.parse(localStorage.getItem('f_v_list')) || [];
        let currentIdx = parseInt(localStorage.getItem('f_v_idx')) || 0;

        function switchTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'home') renderHome();
            if(id === 'manage') renderManage();
        }

        function renderHome() {
            const selector = document.getElementById('topSelector');
            selector.innerHTML = '';
            
            if(vehicles.length === 0) {
                document.getElementById('cardContent').style.opacity = '0.3';
                return;
            }

            document.getElementById('cardContent').style.opacity = '1';
            vehicles.forEach((v, index) => {
                const chip = document.createElement('div');
                chip.className = `v-chip ${index === currentIdx ? 'selected' : ''}`;
                chip.innerText = v.vNo;
                chip.onclick = () => { currentIdx = index; localStorage.setItem('f_v_idx', index); renderHome(); };
                selector.appendChild(chip);
            });

            const current = vehicles[currentIdx] || vehicles[0];
            document.getElementById('dispV').innerText = current.vNo;
            document.getElementById('dispQ').innerText = current.q + "L";
            document.getElementById('dispU').innerText = current.u + "L";
            document.getElementById('dispR').innerText = (current.q - current.u) + "L";
            
            const qrImg = document.getElementById('mainQr');
            if(current.qr) {
                qrImg.src = current.qr;
                qrImg.style.display = 'block';
                document.getElementById('noQrText').style.display = 'none';
            }
        }

        function renderManage() {
            const list = document.getElementById('vList');
            list.innerHTML = '';
            vehicles.forEach((v, index) => {
                const item = document.createElement('div');
                item.className = 'card-list-item';
                item.innerHTML = `
                    <div>
                        <div style="font-weight:bold; color:var(--gold)">${v.vNo}</div>
                        <div style="font-size:11px; opacity:0.6">${v.q}L Quota</div>
                    </div>
                    <button class="btn-del" onclick="deleteVehicle(${index})">ඉවත් කරන්න</button>
                `;
                list.appendChild(item);
            });
        }

        function showForm() { document.getElementById('formOverlay').style.display = 'flex'; }
        function hideForm() { document.getElementById('formOverlay').style.display = 'none'; }

        function saveVehicle() {
            const vNo = document.getElementById('inV').value.toUpperCase();
            const q = document.getElementById('inQ').value;
            const u = document.getElementById('inU').value;
            const f = document.getElementById('inF').files[0];

            if(!vNo || !q) return alert("අවශ්‍ය තොරතුරු ඇතුළත් කරන්න!");

            const newV = { vNo, q, u: u || 0, qr: '' };

            if(f) {
                const reader = new FileReader();
                reader.onload = e => {
                    newV.qr = e.target.result;
                    vehicles.push(newV);
                    finalizeSave();
                };
                reader.readAsDataURL(f);
            } else {
                vehicles.push(newV);
                finalizeSave();
            }
        }

        function finalizeSave() {
            localStorage.setItem('f_v_list', JSON.stringify(vehicles));
            hideForm();
            renderManage();
            alert("සාර්ථකව සුරැකුණි!");
        }

        function deleteVehicle(index) {
            if(confirm("මෙම වාහනය ඉවත් කිරීමට අවශ්‍යද?")) {
                vehicles.splice(index, 1);
                localStorage.setItem('f_v_list', JSON.stringify(vehicles));
                if(currentIdx >= vehicles.length) currentIdx = 0;
                localStorage.setItem('f_v_idx', currentIdx);
                renderManage();
            }
        }

        window.onload = renderHome;
    </script>
</body>
</html>
