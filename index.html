<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Fuel Pass Premium</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap');

        :root {
            --gold: #FFD700;
            --accent: #00F2FF;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            /* අලුත් ලස්සන අඳුරු පසුබිමක් */
            background: #000 url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000') center/cover no-repeat fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.95) 100%);
            backdrop-filter: blur(15px);
            z-index: -1;
        }

        .header { padding: 12px; text-align: center; }
        .logo-text { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 12px; 
            color: var(--gold); 
            letter-spacing: 5px; 
            margin: 0;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .tabs { display: flex; gap: 10px; padding: 5px 20px; }
        .tab-btn { 
            flex: 1; padding: 10px; 
            background: var(--glass); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #777; border-radius: 12px; 
            font-size: 10px; font-weight: 600; cursor: pointer;
        }
        .tab-btn.active { background: var(--gold); color: black; border: none; box-shadow: 0 0 20px rgba(255,215,0,0.3); }

        .v-selector { display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px; scrollbar-width: none; }
        .v-selector::-webkit-scrollbar { display: none; }
        .v-chip { 
            padding: 7px 15px; background: rgba(255,255,255,0.03); 
            border-radius: 20px; font-size: 11px; white-space: nowrap; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .v-chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.1); }

        .view { display: none; flex: 1; padding: 0 20px 20px; flex-direction: column; }
        .view.active { display: flex; animation: slideUp 0.4s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Main Card Design */
        .card-container {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 20px 15px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            flex: 1;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .v-no-main { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 24px; font-weight: 900; 
            color: #fff; margin: 0; 
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Maximum QR Area with Reset Logic */
        .qr-art-frame {
            background: #FFFFFF;
            width: 78vw; height: 78vw;
            max-width: 320px; max-height: 320px;
            margin: 15px auto;
            border-radius: 25px;
            padding: 12px;
            display: flex; align-items: center; justify-content: center;
            border: 12px solid #FFFFFF;
            box-shadow: 0 0 35px rgba(255,255,255,0.1);
        }
        #mainQr { width: 100%; height: 100%; object-fit: contain; }

        /* Sunday Reset Message */
        .reset-note { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        /* Stats Section */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-card { 
            background: rgba(0,0,0,0.4); 
            padding: 12px 5px; border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.03); 
        }
        .s-val { color: var(--gold); font-size: 18px; font-weight: 700; display: block; }
        .s-lbl { font-size: 8px; opacity: 0.4; text-transform: uppercase; margin-top: 4px; }
        .bal-val { color: #00ff88 !important; }

        /* Manage View */
        .manage-card {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px;
            margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-save { 
            background: var(--gold); color: black; border: none; 
            padding: 18px; border-radius: 20px; font-weight: 900; 
            width: 100%; cursor: pointer; margin-top: 20px;
            font-family: 'Orbitron', sans-serif; letter-spacing: 1px;
        }

        #formOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 2000; padding: 25px; flex-direction: column; backdrop-filter: blur(20px);
        }
        input, select {
            width: 100%; padding: 15px; border-radius: 15px; 
            background: rgba(255,255,255,0.07); border: 1px solid #333; 
            color: white; margin-top: 10px; font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="header"><p class="logo-text">FUEL PASS PREMIMUM</p></div>

    <div class="tabs">
        <button class="tab-btn active" id="btnH" onclick="switchTab('home', this)">MY CARD</button>
        <button class="tab-btn" id="btnM" onclick="switchTab('manage', this)">GARAGE</button>
    </div>

    <div id="home" class="view active">
        <div class="v-selector" id="topSelector"></div>
        
        <div class="card-container">
            <div>
                <p class="v-no-main" id="dispV">WP CAD-1234</p>
                <p class="reset-note" id="resetLabel">Weekly Quota Resetting...</p>
            </div>
            
            <div class="qr-art-frame">
                <img id="mainQr" src="" style="display:none;">
                <p id="noQrText" style="color:#444; font-size: 11px;">Upload QR Image</p>
            </div>
            
            <div class="stats-row">
                <div class="stat-card"><span class="s-val" id="dispQ">20L</span><span class="s-lbl">Quota</span></div>
                <div class="stat-card"><span class="s-val" id="dispU" style="color:#ff5555">0L</span><span class="s-lbl">Used</span></div>
                <div class="stat-card"><span class="s-val bal-val" id="dispR">20L</span><span class="s-lbl">Balance</span></div>
            </div>
        </div>
    </div>

    <div id="manage" class="view">
        <div id="vList" style="flex:1; overflow-y:auto;"></div>
        <button class="btn-save" onclick="openForm()">+ ADD VEHICLE</button>
        <p onclick="forceAppUpdate()" style="text-align:center; font-size:10px; color:var(--accent); margin-top:15px; opacity:0.5;">Update Available? Refresh</p>
    </div>

    <div id="formOverlay">
        <h2 style="font-family:'Orbitron'; color:var(--gold); text-align:center; font-size:22px;">CONFIGURATION</h2>
        <input type="hidden" id="editIdx" value="-1">
        <select id="inT">
            <option value="🚗">Car</option><option value="🏍️">Motorbike</option><option value="🚐">Van</option><option value="🛺">Tuk Tuk</option><option value="🚛">Truck</option>
        </select>
        <input type="text" id="inV" placeholder="Vehicle Number">
        <input type="number" id="inQ" placeholder="Total Weekly Quota">
        <input type="number" id="inU" placeholder="Used Amount So Far">
        <label style="font-size:11px; color:#777; margin-top:15px; display:block;">Select QR Image</label>
        <input type="file" id="inF" accept="image/*" style="border:none; background:none;">
        <button class="btn-save" onclick="saveData()">SAVE DETAILS</button>
        <p onclick="hideForm()" style="color:#ff4444; text-align:center; margin-top:25px; cursor:pointer; font-weight:600;">CANCEL</p>
    </div>

    <script>
        // දත්ත ලබාගැනීම (කලින් කෝඩ් එකේ තිබුණු Key එකමයි)
        let vehicles = JSON.parse(localStorage.getItem('f_v_final_list')) || [];
        let activeIdx = parseInt(localStorage.getItem('f_v_final_idx')) || 0;

        // --- Sunday Auto Reset Logic ---
        function checkWeeklyReset() {
            const now = new Date();
            const lastReset = localStorage.getItem('last_reset_date_premium');
            const currentDay = now.getDay(); // 0 = Sunday
            const todayStr = now.toDateString();

            if (currentDay === 0 && lastReset !== todayStr) {
                vehicles.forEach(v => { v.u = 0; });
                localStorage.setItem('f_v_final_list', JSON.stringify(vehicles));
                localStorage.setItem('last_reset_date_premium', todayStr);
                document.getElementById('resetLabel').innerText = "Quota Reset for New Week!";
            } else {
                document.getElementById('resetLabel').innerText = "Next Reset: Sunday 06:00 AM";
            }
        }

        function forceAppUpdate() {
            if(confirm("Refresh app for latest updates?")) {
                const url = window.location.href.split('?')[0];
                window.location.href = url + '?v=' + new Date().getTime();
            }
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            id === 'home' ? renderHome() : renderManage();
        }

        function renderHome() {
            checkWeeklyReset();
            const selector = document.getElementById('topSelector');
            selector.innerHTML = '';
            if(vehicles.length === 0) {
                document.getElementById('dispV').innerText = "NO DATA";
                return;
            }

            vehicles.forEach((v, idx) => {
                const chip = document.createElement('div');
                chip.className = `v-chip ${idx === activeIdx ? 'selected' : ''}`;
                chip.innerHTML = `${v.type} ${v.no}`;
                chip.onclick = () => { activeIdx = idx; localStorage.setItem('f_v_final_idx', idx); renderHome(); };
                selector.appendChild(chip);
            });

            const v = vehicles[activeIdx] || vehicles[0];
            const bal = v.q - v.u;
            document.getElementById('dispV').innerText = v.no;
            document.getElementById('dispQ').innerText = v.q + "L";
            document.getElementById('dispU').innerText = v.u + "L";
            document.getElementById('dispR').innerText = bal + "L";

            const qr = document.getElementById('mainQr');
            if(v.qr) { qr.src = v.qr; qr.style.display = 'block'; document.getElementById('noQrText').style.display = 'none'; }
        }

        function renderManage() {
            const list = document.getElementById('vList');
            list.innerHTML = '';
            vehicles.forEach((v, idx) => {
                list.innerHTML += `<div class="manage-card">
                    <div><b style="color:var(--gold)">${v.no}</b><br><small style="opacity:0.4">${v.type} | ${v.q}L</small></div>
                    <div>
                        <button onclick="openForm(${idx})" style="background:none; border:1px solid #555; color:white; padding:8px 12px; border-radius:12px; font-size:10px;">EDIT</button>
                        <button onclick="deleteV(${idx})" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:8px 12px; border-radius:12px; font-size:10px; margin-left:5px;">X</button>
                    </div>
                </div>`;
            });
        }

        function openForm(idx = -1) {
            document.getElementById('formOverlay').style.display = 'flex';
            if(idx > -1) {
                const v = vehicles[idx];
                document.getElementById('inV').value = v.no; document.getElementById('inQ').value = v.q;
                document.getElementById('inU').value = v.u; document.getElementById('inT').value = v.type;
                document.getElementById('editIdx').value = idx;
            } else {
                document.getElementById('editIdx').value = -1;
                document.getElementById('inV').value = ''; document.getElementById('inQ').value = ''; document.getElementById('inU').value = '0';
            }
        }

        function hideForm() { document.getElementById('formOverlay').style.display = 'none'; }

        function saveData() {
            const no = document.getElementById('inV').value.toUpperCase();
            const q = document.getElementById('inQ').value;
            const u = document.getElementById('inU').value;
            const type = document.getElementById('inT').value;
            const f = document.getElementById('inF').files[0];
            const idx = parseInt(document.getElementById('editIdx').value);
            if(!no || !q) return alert("Fill all details!");

            let vData = idx > -1 ? vehicles[idx] : { no, q, u, type, qr: '' };
            vData.no = no; vData.q = q; vData.u = u; vData.type = type;

            if(f) {
                const reader = new FileReader();
                reader.onload = e => { vData.qr = e.target.result; if(idx === -1) vehicles.push(vData); finalize(); };
                reader.readAsDataURL(f);
            } else { if(idx === -1) return alert("Upload QR Image!"); finalize(); }
        }

        function finalize() {
            localStorage.setItem('f_v_final_list', JSON.stringify(vehicles));
            hideForm(); renderHome(); switchTab('home', document.getElementById('btnH'));
        }

        function deleteV(idx) {
            if(confirm("Remove this vehicle?")) { 
                vehicles.splice(idx,1); 
                localStorage.setItem('f_v_final_list', JSON.stringify(vehicles)); 
                renderManage(); 
            }
        }
        window.onload = renderHome;
    </script>
</body>
</html>
