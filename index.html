<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Fuel Pass Smart Pro</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap');

        :root {
            --gold: #FFD700;
            --accent: #00F2FF;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: #000 url('https://images.unsplash.com/photo-1610647752706-3bb12232b3ab?q=80&w=1500') center/cover no-repeat fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: -1;
        }

        /* Top Header */
        .header { padding: 10px; text-align: center; }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--gold); letter-spacing: 2px; margin: 0; }

        .tabs { display: flex; gap: 8px; padding: 5px 15px; }
        .tab-btn { flex: 1; padding: 8px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #888; border-radius: 10px; font-size: 10px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: black; border: none; }

        /* Vehicle Selector */
        .v-selector { display: flex; overflow-x: auto; padding: 10px 15px; gap: 8px; scrollbar-width: none; }
        .v-selector::-webkit-scrollbar { display: none; }
        .v-chip { padding: 6px 15px; background: var(--glass); border-radius: 20px; font-size: 10px; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }
        .v-chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.1); }

        .view { display: none; flex: 1; padding: 0 15px 10px; flex-direction: column; justify-content: flex-start; }
        .view.active { display: flex; animation: fadeIn 0.4s ease; }

        /* Main Card Layout */
        .card-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: auto;
            max-height: 85vh;
        }

        .v-no-main { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; margin: 0; letter-spacing: 1px; }
        
        /* QR Area - Maximum possible size while fitting stats */
        .qr-art-frame {
            background: #FFFFFF;
            width: 75vw; height: 75vw;
            max-width: 280px; max-height: 280px;
            margin: 10px auto;
            border-radius: 15px;
            padding: 8px;
            display: flex; align-items: center; justify-content: center;
            border: 8px solid #FFFFFF;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        #mainQr { width: 100%; height: 100%; object-fit: contain; }

        /* Compact Stats Row */
        .stats-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 5px; 
            margin-top: 10px; 
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 15px;
        }
        .stat-box { text-align: center; }
        .s-val { color: var(--gold); font-size: 16px; font-weight: 700; display: block; }
        .s-lbl { font-size: 8px; opacity: 0.5; text-transform: uppercase; }
        .bal-box { border-left: 1px solid rgba(255,255,255,0.1); }

        /* Form & Management */
        #vList { overflow-y: auto; flex: 1; margin-bottom: 10px; }
        .manage-card { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        #formOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; padding: 20px; flex-direction: column; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.08); border: 1px solid #333; color: white; margin-top: 8px; }
        .btn-save { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 15px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header"><p class="logo-text">FUEL PASS SMART</p></div>

    <div class="tabs">
        <button class="tab-btn active" id="btnH" onclick="switchTab('home', this)">CARD</button>
        <button class="tab-btn" id="btnM" onclick="switchTab('manage', this)">GARAGE</button>
    </div>

    <div id="home" class="view active">
        <div class="v-selector" id="topSelector"></div>
        <div class="card-container">
            <p class="v-no-main" id="dispV">NO VEHICLE</p>
            
            <div class="qr-art-frame">
                <img id="mainQr" src="" style="display:none;">
                <p id="noQrText" style="color:#666; font-size: 10px;">ADD QR IN GARAGE</p>
            </div>
            
            <div class="stats-row">
                <div class="stat-box"><span class="s-val" id="dispQ">0L</span><span class="s-lbl">Quota</span></div>
                <div class="stat-box"><span class="s-val" id="dispU" style="color:#ff4444">0L</span><span class="s-lbl">Used</span></div>
                <div class="stat-box bal-box"><span class="s-val" id="dispR" style="color:#00ff88">0L</span><span class="s-lbl">Balance</span></div>
            </div>
            <p id="resetMsg" style="font-size: 8px; color: #888; margin-top: 8px;">Quota resets every Sunday 06:00 AM</p>
        </div>
    </div>

    <div id="manage" class="view">
        <div id="vList"></div>
        <button class="btn-save" onclick="openForm()">+ ADD VEHICLE</button>
    </div>

    <div id="formOverlay">
        <h2 style="font-family:'Orbitron'; color:var(--gold); font-size:18px;">SETTINGS</h2>
        <input type="hidden" id="editIdx" value="-1">
        <select id="inT">
            <option value="🚗">Car</option><option value="🏍️">Motorbike</option><option value="🚐">Van</option><option value="🛺">Tuk Tuk</option><option value="🚛">Truck</option>
        </select>
        <input type="text" id="inV" placeholder="Vehicle Number">
        <input type="number" id="inQ" placeholder="Weekly Quota">
        <input type="number" id="inU" placeholder="Used This Week">
        <label style="font-size:10px; color:#666; margin-top:10px; display:block;">Upload QR Screenshot</label>
        <input type="file" id="inF" accept="image/*">
        <button class="btn-save" onclick="saveData()">SAVE VEHICLE</button>
        <p onclick="hideForm()" style="color:#ff4444; text-align:center; margin-top:20px; cursor:pointer;">Cancel</p>
    </div>

    <script>
        let vehicles = JSON.parse(localStorage.getItem('fuel_smart_v1')) || [];
        let activeIdx = parseInt(localStorage.getItem('fuel_smart_idx')) || 0;

        // --- Sunday Auto Reset Logic ---
        function checkWeeklyReset() {
            const now = new Date();
            const lastReset = localStorage.getItem('last_reset_date');
            
            // සතියේ දවස (0 = ඉරිදා)
            const currentDay = now.getDay();
            const todayDateString = now.toDateString();

            if (currentDay === 0 && lastReset !== todayDateString) {
                // අද ඉරිදා සහ අද reset වෙලා නැත්නම්
                vehicles.forEach(v => { v.u = 0; });
                localStorage.setItem('fuel_smart_v1', JSON.stringify(vehicles));
                localStorage.setItem('last_reset_date', todayDateString);
                console.log("Weekly Quota Reset Successful!");
            }
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            id === 'home' ? renderHome() : renderManage();
        }

        function renderHome() {
            checkWeeklyReset();
            const selector = document.getElementById('topSelector');
            selector.innerHTML = '';
            if(vehicles.length === 0) return;

            vehicles.forEach((v, idx) => {
                const chip = document.createElement('div');
                chip.className = `v-chip ${idx === activeIdx ? 'selected' : ''}`;
                chip.innerHTML = `${v.type} ${v.no}`;
                chip.onclick = () => { activeIdx = idx; localStorage.setItem('fuel_smart_idx', idx); renderHome(); };
                selector.appendChild(chip);
            });

            const v = vehicles[activeIdx] || vehicles[0];
            const bal = v.q - v.u;
            document.getElementById('dispV').innerText = v.no;
            document.getElementById('dispQ').innerText = v.q + "L";
            document.getElementById('dispU').innerText = v.u + "L";
            document.getElementById('dispR').innerText = bal + "L";

            const qr = document.getElementById('mainQr');
            if(v.qr) { qr.src = v.qr; qr.style.display = 'block'; document.getElementById('noQrText').style.display = 'none'; }
        }

        function renderManage() {
            const list = document.getElementById('vList');
            list.innerHTML = '';
            vehicles.forEach((v, idx) => {
                list.innerHTML += `<div class="manage-card">
                    <div><b>${v.no}</b><br><small style="opacity:0.5">${v.q}L Quota</small></div>
                    <div>
                        <button onclick="openForm(${idx})" style="background:none; border:1px solid #555; color:white; padding:5px 10px; border-radius:8px; font-size:10px;">EDIT</button>
                        <button onclick="deleteV(${idx})" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:5px 10px; border-radius:8px; font-size:10px; margin-left:5px;">X</button>
                    </div>
                </div>`;
            });
        }

        function openForm(idx = -1) {
            document.getElementById('formOverlay').style.display = 'flex';
            if(idx > -1) {
                const v = vehicles[idx];
                document.getElementById('inV').value = v.no; document.getElementById('inQ').value = v.q;
                document.getElementById('inU').value = v.u; document.getElementById('inT').value = v.type;
                document.getElementById('editIdx').value = idx;
            } else {
                document.getElementById('editIdx').value = -1;
                document.getElementById('inV').value = ''; document.getElementById('inQ').value = ''; document.getElementById('inU').value = '0';
            }
        }

        function hideForm() { document.getElementById('formOverlay').style.display = 'none'; }

        function saveData() {
            const no = document.getElementById('inV').value.toUpperCase();
            const q = document.getElementById('inQ').value;
            const u = document.getElementById('inU').value;
            const type = document.getElementById('inT').value;
            const f = document.getElementById('inF').files[0];
            const idx = parseInt(document.getElementById('editIdx').value);
            if(!no || !q) return alert("Please fill details!");

            let vData = idx > -1 ? vehicles[idx] : { no, q, u, type, qr: '' };
            vData.no = no; vData.q = q; vData.u = u; vData.type = type;

            if(f) {
                const reader = new FileReader();
                reader.onload = e => { vData.qr = e.target.result; if(idx === -1) vehicles.push(vData); finalize(); };
                reader.readAsDataURL(f);
            } else { if(idx === -1) return alert("Upload QR!"); finalize(); }
        }

        function finalize() {
            localStorage.setItem('fuel_smart_v1', JSON.stringify(vehicles));
            hideForm(); renderHome(); switchTab('home', document.getElementById('btnH'));
        }

        function deleteV(idx) {
            if(confirm("Remove?")) { vehicles.splice(idx,1); localStorage.setItem('fuel_smart_v1', JSON.stringify(vehicles)); renderManage(); }
        }
        
        window.onload = renderHome;
    </script>
</body>
</html>
