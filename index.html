<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Fuel Pass Pro Max+ </title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZ1ZWwgUGFzcyBQcm8iLAogICJzaG9ydF9uYW1lIjogIkZ1ZWxQYXNzIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDAwMDAwIiwKICAidGhlbWVfY29sb3IiOiAiI2ZmY2MwMCIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi80ODMvNDgzNDk3LnBuZyIsICJzaXplcyI6ICI1MTJ4NTEyIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiB9XQp9">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap');

        :root {
            --gold: #FFD700;
            --accent: #00F2FF;
            --bg-overlay: rgba(0, 0, 0, 0.8);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none;}

        body {
            margin: 0; padding: 0;
            background-color: #000;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            height: 100dvh;
            display: flex; flex-direction: column;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
        }

        body::before {
            content: "";
            position: fixed; inset: 0;
            background: var(--bg-overlay);
            backdrop-filter: blur(10px);
            z-index: -1;
        }

        .header { padding: 15px 15px 5px; text-align: center; }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px; letter-spacing: 3px;
            color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            margin: 0;
        }

        .tabs { display: flex; gap: 8px; padding: 5px 15px; }
        .tab-btn { 
            flex: 1; padding: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--glass); color: #aaa; border-radius: 12px;
            font-size: 11px; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px);
        }
        .tab-btn.active { background: var(--gold); color: black; border: none; box-shadow: 0 4px 10px rgba(255,215,0,0.3); }

        .v-selector { display: flex; overflow-x: auto; padding: 5px 15px 10px; gap: 10px; scrollbar-width: none; }
        .v-selector::-webkit-scrollbar { display: none; }
        
        .v-chip {
            padding: 8px 15px; background: var(--glass); border-radius: 20px;
            white-space: nowrap; border: 1px solid rgba(255,255,255,0.1);
            font-size: 11px; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .v-chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(0, 242, 255, 0.15); transform: scale(1.03); }

        .view { display: none; flex: 1; overflow-y: auto; padding: 0 15px 15px; }
        .view.active { display: flex; flex-direction: column; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-container {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 20px 15px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            margin-top: 5px;
        }

        .v-icon-box { font-size: 35px; margin-bottom: 2px; }
        .v-no-main { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; margin: 0; color: #fff; letter-spacing: 1px; }

        /* --- Super Clear Super Large QR Area --- */
        .qr-art-frame {
            background: #FFFFFF; /* නියම සුදු පාට පසුබිම (Scan Clarity එකට වැදගත්) */
            width: 90vw; /* පෝන් එකේ පළල අනුව උපරිමයෙන් */
            height: 90vw; /* සමචතුරස්‍රයක් ලෙස */
            max-width: 320px; /* ලොකු පෝන් වල අතිශයින් ලොකු වීම වැලැක්වීමට */
            max-height: 320px;
            margin: 15px auto; /* මැදට පේන ලෙස */
            border-radius: 15px;
            padding: 15px; /* QR එක වටේට ඉඩ තැබුවා ස්කෑන් කිරීමට පහසු වීමට */
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.8);
            border: 5px solid #FFFFFF; /* පසුබිම තවත් පුළුල් කිරීමට */
        }
        
        #mainQr {
            width: 100%; height: 100%;
            object-fit: contain; /* QR එක විකෘති නොවී පේන ලෙස */
            image-rendering: auto; /* QR Code එක පැහැදිලිව පේන ලෙස */
        }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat-card { background: rgba(0,0,0,0.5); padding: 10px 2px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .s-val { color: var(--gold); font-size: 16px; font-weight: 700; }
        .s-lbl { font-size: 8px; opacity: 0.5; text-transform: uppercase; margin-top: 3px; }

        .warning-tag { background: #ff4444; color: white; padding: 3px 10px; border-radius: 50px; font-size: 9px; font-weight: bold; margin-bottom: 5px; align-self: center; animation: blink 1s infinite; display: none; }
        @keyframes blink { 50% { opacity: 0.4; } }

        /* Form & Management */
        #formOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 2000; padding: 25px; flex-direction: column; overflow-y: auto; backdrop-filter: blur(15px);
        }
        input, select {
            width: 100%; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.08);
            border: 1px solid #333; color: white; margin-top: 5px; font-size: 15px;
        }
        .btn-save { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 15px; box-shadow: 0 8px 15px rgba(255,215,0,0.2); }
        
        .manage-card {
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px;
            margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.03);
        }

        .update-bar {
            background: rgba(0, 242, 255, 0.08); color: var(--accent);
            padding: 8px; border-radius: 10px; text-align: center;
            font-size: 10px; margin-top: 15px; border: 1px dashed rgba(0,242,255,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header"><p class="logo-text">FUEL PASS PRO</p></div>

    <div class="tabs">
        <button class="tab-btn active" id="btnH" onclick="switchTab('home', this)">MY CARD</button>
        <button class="tab-btn" id="btnM" onclick="switchTab('manage', this)">GARAGE</button>
    </div>

    <div id="home" class="view active">
        <div class="v-selector" id="topSelector"></div>
        <div id="fuelWarn" class="warning-tag">⚠️ LOW BALANCE</div>
        
        <div class="card-container" id="mainCard">
            <div class="v-icon-box" id="dispIcon">🚗</div>
            <p class="v-no-main" id="dispV">NO DATA</p>
            
            <div class="qr-art-frame">
                <img id="mainQr" src="" style="display:none;">
                <p id="noQrText" style="color:#666; font-size: 11px; text-align:center;">Add Data in Garage</p>
            </div>
            
            <div class="stats-row">
                <div class="stat-card"><div class="s-val" id="dispQ">0L</div><div class="s-lbl">Quota</div></div>
                <div class="stat-card"><div class="s-val" id="dispU">0L</div><div class="s-lbl">Used</div></div>
                <div class="stat-card" style="border: 1px solid rgba(0,255,136,0.1)"><div class="s-val" id="dispR" style="color:#00ff88">0L</div><div class="s-lbl">Bal</div></div>
            </div>
        </div>
    </div>

    <div id="manage" class="view">
        <h3 style="color:var(--gold); font-family:'Orbitron'; font-size:12px; margin-bottom:15px;">Garage Management</h3>
        <div id="vList"></div>
        <button class="btn-save" onclick="openForm()">+ Add Vehicle</button>
        
        <div class="update-bar" onclick="forceAppUpdate()">
            Check for Updates
        </div>
    </div>

    <div id="formOverlay">
        <h2 style="font-family:'Orbitron'; color:var(--gold); font-size:18px;">Configuration</h2>
        <input type="hidden" id="editIdx" value="-1">
        
        <label style="font-size:10px; color:#666; margin-top:8px; display:block;">Vehicle Type</label>
        <select id="inT">
            <option value="🚗">Car (Luxury)</option>
            <option value="🏍️">Motorbike (Sport)</option>
            <option value="🚐">Van / SUV</option>
            <option value="🛺">Tuk Tuk</option>
            <option value="🚛">Truck / Lorry</option>
        </select>
        
        <input type="text" id="inV" placeholder="Vehicle Number (Ex: WP CAD-1234)">
        <input type="number" id="inQ" placeholder="Weekly Quota (Liters)">
        <input type="number" id="inU" placeholder="Used Amount (Liters)">
        
        <label style="font-size:10px; color:#666; margin-top:12px; display:block;">Upload QR Screenshot</label>
        <input type="file" id="inF" accept="image/*" style="padding:8px; background:none; border:1px dashed #444; font-size:11px;">
        
        <button class="btn-save" onclick="saveData()">SAVE & APPLY</button>
        <p onclick="hideForm()" style="color:#ff4444; text-align:center; margin-top:20px; cursor:pointer; font-weight:600; font-size:13px;">Cancel</p>
    </div>

    <script>
        const bgImages = {
            "🚗": "https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1500",
            "🏍️": "https://images.unsplash.com/photo-1558981403-c5f91cbba527?q=80&w=1500",
            "🚐": "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?q=80&w=1500",
            "🛺": "https://images.unsplash.com/photo-1590130751939-99432f866993?q=80&w=1500",
            "🚛": "https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?q=80&w=1500"
        };

        let vehicles = JSON.parse(localStorage.getItem('fuel_vL_list')) || [];
        let activeIdx = parseInt(localStorage.getItem('fuel_vL_idx')) || 0;

        // Force Update Logic
        function forceAppUpdate() {
            if(confirm("Checking for updates... The app will reload. Your data is safe.")) {
                const cleanURL = window.location.href.split('?')[0];
                window.location.href = cleanURL + '?update=' + new Date().getTime();
            }
        }

        // Auto Update Logic - GitHub
        window.addEventListener('focus', () => {
            fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' })
                .then(response => {
                    const lastModified = response.headers.get('last-modified');
                    const savedModified = localStorage.getItem('app_last_modified_final');

                    if (savedModified && lastModified !== savedModified) {
                        localStorage.setItem('app_last_modified_final', lastModified);
                        // Reload and clear cache
                        window.location.reload(true);
                    } else {
                        localStorage.setItem('app_last_modified_final', lastModified);
                    }
                })
                .catch(err => console.log("Update check failed", err));
        });

        function switchTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            id === 'home' ? renderHome() : renderManage();
        }

        function renderHome() {
            const selector = document.getElementById('topSelector');
            selector.innerHTML = '';
            
            if(vehicles.length === 0) {
                document.getElementById('mainCard').style.opacity = '0.3';
                document.getElementById('dispV').innerText = "EMPTY";
                document.getElementById('fuelWarn').style.display = 'none';
                return;
            }

            document.getElementById('mainCard').style.opacity = '1';
            vehicles.forEach((v, idx) => {
                const chip = document.createElement('div');
                chip.className = `v-chip ${idx === activeIdx ? 'selected' : ''}`;
                chip.innerHTML = `${v.type} ${v.no}`;
                chip.onclick = () => { activeIdx = idx; localStorage.setItem('fuel_vL_idx', idx); renderHome(); };
                selector.appendChild(chip);
            });

            const current = vehicles[activeIdx] || vehicles[0];
            const balance = current.q - current.u;
            
            document.getElementById('dispV').innerText = current.no;
            document.getElementById('dispIcon').innerText = current.type;
            document.getElementById('dispQ').innerText = current.q + "L";
            document.getElementById('dispU').innerText = current.u + "L";
            document.getElementById('dispR').innerText = balance + "L";
            document.getElementById('fuelWarn').style.display = (balance <= 2) ? 'block' : 'none';

            // Background change
            document.body.style.backgroundImage = `url('${bgImages[current.type]}')`;

            const qr = document.getElementById('mainQr');
            if(current.qr) { 
                qr.src = current.qr; 
                qr.style.display = 'block'; 
                document.getElementById('noQrText').style.display = 'none'; 
            } else {
                qr.style.display = 'none';
                document.getElementById('noQrText').style.display = 'block';
            }
        }

        function renderManage() {
            const list = document.getElementById('vList');
            list.innerHTML = '';
            vehicles.forEach((v, idx) => {
                list.innerHTML += `<div class="manage-card">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div style="font-size:20px;">${v.type}</div>
                        <div><b style="color:var(--gold); font-size:13px;">${v.no}</b><br><small style="opacity:0.5; font-size:10px;">${v.q-v.u}L Balance</small></div>
                    </div>
                    <div>
                        <button onclick="openForm(${idx})" style="background:none; border:1px solid #444; color:white; padding:6px 10px; border-radius:10px; font-size:9px;">EDIT</button>
                        <button onclick="deleteV(${idx})" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:6px 10px; border-radius:10px; font-size:9px; margin-left:3px;">X</button>
                    </div>
                </div>`;
            });
        }

        function openForm(idx = -1) {
            document.getElementById('formOverlay').style.display = 'flex';
            if(idx > -1) {
                const v = vehicles[idx];
                document.getElementById('inV').value = v.no; document.getElementById('inQ').value = v.q;
                document.getElementById('inU').value = v.u; document.getElementById('inT').value = v.type;
                document.getElementById('editIdx').value = idx;
            } else {
                document.getElementById('editIdx').value = -1;
                document.getElementById('inV').value = ''; document.getElementById('inQ').value = ''; document.getElementById('inU').value = '0';
            }
        }

        function hideForm() { document.getElementById('formOverlay').style.display = 'none'; }

        function saveData() {
            const no = document.getElementById('inV').value.toUpperCase();
            const q = document.getElementById('inQ').value;
            const u = document.getElementById('inU').value;
            const type = document.getElementById('inT').value;
            const f = document.getElementById('inF').files[0];
            const idx = parseInt(document.getElementById('editIdx').value);

            if(!no || !q) return alert("Vehicle number and Quota are required!");

            let vData = idx > -1 ? vehicles[idx] : { no, q, u, type, qr: '' };
            vData.no = no; vData.q = q; vData.u = u; vData.type = type;

            if(f) {
                const reader = new FileReader();
                reader.onload = e => { 
                    vData.qr = e.target.result; 
                    if(idx === -1) vehicles.push(vData); 
                    finalize(); 
                };
                reader.readAsDataURL(f);
            } else {
                if(idx === -1) return alert("Please upload the QR screenshot!");
                finalize();
            }
        }

        function finalize() {
            localStorage.setItem('fuel_vL_list', JSON.stringify(vehicles));
            hideForm(); renderHome(); switchTab('home', document.getElementById('btnH'));
        }

        function deleteV(idx) {
            if(confirm("Are you sure you want to remove this vehicle?")) { 
                vehicles.splice(idx,1); 
                localStorage.setItem('fuel_vL_list', JSON.stringify(vehicles)); 
                if(activeIdx >= vehicles.length) activeIdx = 0;
                localStorage.setItem('fuel_vL_idx', activeIdx);
                renderManage(); 
            }
        }
        window.onload = renderHome;
    </script>
</body>
</html>
